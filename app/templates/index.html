<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Asset Manager</title>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Security Lab: Asset Manager</h1>
            <p class="text-sm text-gray-500 mt-2">Served by: <span class="bg-blue-100 text-blue-800 px-2 py-0.5 rounded font-mono">{{ pod }}</span></p>
        </header>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-8">
            <form method="POST" class="flex gap-3">
                <input type="text" name="name" placeholder="Enter new asset name..." 
                    class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none transition-all" 
                    required>
                <button type="submit" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
                    Add Item
                </button>
            </form>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-200">
                    <tr>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600">Asset Name</th>
                        <th class="px-6 py-4 text-sm font-semibold text-gray-600 text-right">Actions</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    {% for item in items %}
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 text-gray-800">{{ item.name }}</td>
                        <td class="px-6 py-4 text-right space-x-3">
                            <a href="{{ url_for('edit', id=item.id) }}" class="text-indigo-600 hover:text-indigo-900 text-sm font-medium">Edit</a>
                            <a href="{{ url_for('delete', id=item.id) }}" class="text-red-600 hover:text-red-900 text-sm font-medium">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
