apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: secure-app-ingress
  # Removed ingressClassName from here
spec:
  ingressClassName: nginx  # <--- Moved to spec (this is the standard)
  rules:
  - host: myapp.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: secure-app-service
            port:
              number: 80
