apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template: # This is the Pod Blueprint
    metadata:
      labels:
        app: secure-app
    spec: # <--- THIS IS THE POD SPEC
      containers: # <--- CONTAINERS MUST BE INSIDE THE POD SPEC
      - name: secure-app
        image: secure-app:latest
        imagePullPolicy: Never  # <--- ADD THIS LINE
        env:
        - name: FLASK_HOST
          value: "0.0.0.0"
        ports:
        - containerPort: 5000
