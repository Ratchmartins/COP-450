apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  labels:
    app: secure-app
spec:
  replicas: 20
  # Tells the deployment which pods it is responsible for
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      # These labels MUST match the selector above
      labels:
        app: secure-app
    spec:
      # Required for pulling your private image from GitHub Container Registry
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
      - name: secure-app
        # Using the GHCR path from your pipeline logs
        image: ghcr.io/ratchmartins/cop-450/secure-app:latest
        # Forces K3s to check for a new image even if the tag is 'latest'
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: "db-service"
        - name: DB_PASS
          value: "password"
        ports:
        - containerPort: 5000
