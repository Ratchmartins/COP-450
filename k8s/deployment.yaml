apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  labels:
    app: secure-app
spec:
  # Reduced to 2 to prevent overloading your Kali node
  replicas: 20
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
      - name: secure-app
        image: ghcr.io/ratchmartins/cop-450/secure-app:latest
        imagePullPolicy: Always
        env:
        - name: DB_HOST
          value: "db-service"
        - name: DB_PASS
          value: "password"
        ports:
        - containerPort: 5000

        # --- PROBES ADDED BELOW ---

        # READINESS: Only sends users to this pod if the /health route returns 200 OK
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10   # Give Flask a moment to boot up
          periodSeconds: 5          # Check frequently to catch DB drops quickly
          failureThreshold: 3       # If it fails 3 times, take it out of the service rotation

        # LIVENESS: Restarts the pod if the app completely freezes
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 20   # Give it plenty of time for the first start
          periodSeconds: 15         # Don't check too often to save CPU
