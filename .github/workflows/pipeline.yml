name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt pytest bandit
      - name: Run Unit Tests
        run: pytest
      - name: Run Security Scan (Bandit)
        run: bandit -r app/

  deploy-production:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pre-flight Permission Check
        run: |
          set -xe
          # This forces a non-interactive check. If the sudoers file isn't set
          # correctly, this will fail immediately and tell you why.
          sudo -n true

      - name: Configure K3s (Disable Traefik & Prepare Nginx)
        run: |
          set -xe
          sudo -n mkdir -p /etc/rancher/k3s/
          echo "disable: [traefik]" | sudo -n tee /etc/rancher/k3s/config.yaml
          sudo -n systemctl restart k3s
          sleep 10

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/secure-app:latest" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Deploy to Local Kubernetes
        run: |
          set -xe
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Pull the new image non-interactively
          sudo -n crictl pull ${{ env.IMAGE_NAME }}
          
          # Apply the configuration (deployment, service, ingress)
          kubectl apply -f k8s/
          
          # Wait for rollout
          kubectl rollout status deployment/secure-app -n default
