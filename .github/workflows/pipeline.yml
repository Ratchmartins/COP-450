name: CI Pipeline 

on: 
  push: 
    branches: ["main"] 

jobs: 
  build: 
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies 
        run: pip install -r requirements.txt pytest

      - name: Run Tests 
        run: pytest 

      - name: Install Bandit 
        run: pip install bandit

      - name: Run Security Scan 
        run: bandit -r app/

      - name: Build Docker Image 
        run: docker build -t secure-app . 

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'secure-app:latest'
          format: 'table'
          exit-code: '1' # This fails the build if vulnerabilities are found
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Scan Image 
        run: trivy image secure-app 

      - name: Use Secret 
        env: 
          MY_API_KEY: ${{ secrets.MY_SECRET_KEY }}
        run: echo "The secret is loaded successfully."
        
