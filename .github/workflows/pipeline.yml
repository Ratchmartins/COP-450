name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt pytest bandit
      - name: Run Unit Tests
        run: pytest
      - name: Run Security Scan (Bandit)
        run: bandit -r app/

  deploy-production:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure K3s (Disable Traefik & Prepare Nginx)
        run: |
          # 1. Create config directory if not exists
          sudo mkdir -p /etc/rancher/k3s/
          # 2. Set the config to disable Traefik explicitly
          echo "disable: [traefik]" | sudo tee /etc/rancher/k3s/config.yaml
          # 3. Restart K3s to apply the change (Traefik will disappear, freeing port 80)
          sudo systemctl restart k3s
          # 4. Give the cluster a moment to stabilize
          sleep 10

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Image Name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/secure-app:latest" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}

      - name: Deploy to Local Kubernetes
        run: |
          export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
          
          # Pull the new image
          sudo -n crictl pull ${{ env.IMAGE_NAME }}
          
          # Apply the entire configuration folder (Deployment, Service, Ingress)
          kubectl apply -f k8s/
          
          # Wait for the secure-app deployment
          kubectl rollout status deployment/secure-app -n default
