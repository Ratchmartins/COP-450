name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # 1. Test and Security Job
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt pytest bandit

      - name: Run Unit Tests
        run: pytest

      - name: Run Security Scan (Bandit)
        run: bandit -r app/

  # 2. Build and Deploy Job
  deploy-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Build the Docker image
      - name: Build Docker Image
        run: docker build -t secure-app:latest .

      # Setup Kubernetes-in-Docker (Kind)
      - name: Create K8s Cluster
        uses: helm/kind-action@v1.5.0
        with:
          cluster_name: secure-cluster  # Explicitly name the cluster

      # Load the image into the Kind cluster
      - name: Load image into Kind
        run: kind load docker-image secure-app:latest --name secure-cluster

      # Apply your Kubernetes Manifests
      - name: Deploy to K8s
        run: kubectl apply -f k8s/

      # Verify Accessibility (The "Sanity Check")
      - name: Wait for Deployment
        run: kubectl wait --for=condition=ready pod -l app=secure-app --timeout=60s

      - name: Functional Test
        run: |
          # Use port-forward to test connectivity
          kubectl port-forward deployment/secure-app 5000:5000 &
          sleep 5
          curl -I http://localhost:5000
