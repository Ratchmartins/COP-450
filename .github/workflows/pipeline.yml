name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # 1. Test and Security Job
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt pytest bandit
      - name: Run Unit Tests
        run: pytest
      - name: Run Security Scan (Bandit)
        run: bandit -r app/

  # 2. Build and Deploy Job
  deploy-production:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lower case owner name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/secure-app:latest" >> $GITHUB_ENV

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}

      # Deploy locally - No SSH needed!
      - name: Deploy to Local Kubernetes
        run: |
          # Pull the new image locally
          sudo -n crictl pull ${{ env.IMAGE_NAME }}
          
          # Update the deployment
          kubectl set image deployment/secure-app secure-app=${{ env.IMAGE_NAME }} -n default
          
          # Wait for rollout to complete
          kubectl rollout status deployment/secure-app -n default
