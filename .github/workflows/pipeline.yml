name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  # 1. Test and Security Job
  test:
    runs-on: ubuntu-latest
    env:
      # This creates a lowercase version of your repo name to use later
      IMAGE_NAME: ""
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt pytest bandit

      - name: Run Unit Tests
        run: pytest

      - name: Run Security Scan (Bandit)
        run: bandit -r app/

  # 2. Build and Deploy Job
  deploy-production:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 1. Login to GitHub Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

          # Add this specific step to set the lowercase variable
      - name: Set lower case owner name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}/secure-app:latest" >> $GITHUB_ENV

      # 2. Build and Push to Registry
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: ${{ env.IMAGE_NAME }}

      # 3. SSH into Kali VM and update Kubernetes
      - name: Deploy to Kali VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.KALI_VM_IP }} # 172.168.11.126
          username: ${{ secrets.KALI_USER }}
          key: ${{ secrets.KALI_SSH_KEY }}
          script: |
            # Pull the new image on the server
            sudo crictl pull ${{ env.IMAGE_NAME }}

            
            # Tell K8s to use the new image
            sudo kubectl set image deployment/secure-app secure-app=${{ env.IMAGE_NAME }} -n default
            
            # Wait for rollout to complete
            sudo kubectl rollout status deployment/secure-app -n default
